<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320" font-family="monospace">
  <rect width="700" height="320" fill="#0d1117" rx="12"/>
  <text x="350" y="30" text-anchor="middle" fill="#58a6ff" font-size="15" font-weight="bold">Treated Patients by Priority</text>
  <text x="350" y="50" text-anchor="middle" fill="#8b949e" font-size="11">24-Hour Simulation — 387 Total Treated</text>

  <!-- Y axis -->
  <line x1="80" y1="70" x2="80" y2="260" stroke="#30363d" stroke-width="1.5"/>
  <!-- X axis -->
  <line x1="80" y1="260" x2="650" y2="260" stroke="#30363d" stroke-width="1.5"/>

  <!-- Y labels -->
  <text x="70" y="264" text-anchor="end" fill="#8b949e" font-size="10">0</text>
  <text x="70" y="214" text-anchor="end" fill="#8b949e" font-size="10">50</text>
  <text x="70" y="164" text-anchor="end" fill="#8b949e" font-size="10">100</text>
  <text x="70" y="114" text-anchor="end" fill="#8b949e" font-size="10">150</text>
  <line x1="78" y1="214" x2="650" y2="214" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="78" y1="164" x2="650" y2="164" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="78" y1="114" x2="650" y2="114" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bars: scale 1 unit = 1px, max 127 → 127px height -->
  <!-- Priority 10: 124 patients -->
  <rect x="110" y="136" width="80" height="124" fill="#1f6feb" rx="4"/>
  <text x="150" y="128" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">124</text>
  <text x="150" y="278" text-anchor="middle" fill="#cdd9e5" font-size="11">P=10</text>
  <text x="150" y="291" text-anchor="middle" fill="#8b949e" font-size="9">32.0%</text>

  <!-- Priority 9: 127 patients -->
  <rect x="240" y="133" width="80" height="127" fill="#388bfd" rx="4"/>
  <text x="280" y="125" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">127</text>
  <text x="280" y="278" text-anchor="middle" fill="#cdd9e5" font-size="11">P=9</text>
  <text x="280" y="291" text-anchor="middle" fill="#8b949e" font-size="9">32.8%</text>

  <!-- Priority 8: 117 patients -->
  <rect x="370" y="143" width="80" height="117" fill="#2ea043" rx="4"/>
  <text x="410" y="135" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">117</text>
  <text x="410" y="278" text-anchor="middle" fill="#cdd9e5" font-size="11">P=8</text>
  <text x="410" y="291" text-anchor="middle" fill="#8b949e" font-size="9">30.2%</text>

  <!-- Priority 7: 19 patients -->
  <rect x="500" y="241" width="80" height="19" fill="#d29922" rx="4"/>
  <text x="540" y="233" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="bold">19</text>
  <text x="540" y="278" text-anchor="middle" fill="#cdd9e5" font-size="11">P=7</text>
  <text x="540" y="291" text-anchor="middle" fill="#8b949e" font-size="9">4.9%</text>

  <text x="350" y="312" text-anchor="middle" fill="#8b949e" font-size="10">Higher priority patients always treated first — Max Heap guarantee</text>
</svg>
