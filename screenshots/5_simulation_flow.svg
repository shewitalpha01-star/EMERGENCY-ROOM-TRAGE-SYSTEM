<svg xmlns="http://www.w3.org/2000/svg" width="800" height="620" viewBox="0 0 800 620">
  <rect width="800" height="620" fill="#0D1117"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI,Arial" font-size="18" font-weight="bold" fill="#58A6FF">Emergency Room Triage — Simulation Flow</text>
  <text x="400" y="56" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#8B949E">Heap-Based Priority Queue · Max Heap Algorithm</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="270" y="80" width="260" height="60" rx="10" fill="#161B22" stroke="#1F6FEB" stroke-width="2"/>
  <text x="400" y="106" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="#58A6FF">STEP 1</text>
  <text x="400" y="126" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#E6EDF3">Load 1000 patients from CSV</text>

  <!-- Arrow 1→2 -->
  <line x1="400" y1="140" x2="400" y2="168" stroke="#30363D" stroke-width="2"/>
  <polygon points="400,172 394,162 406,162" fill="#30363D"/>

  <!-- Step 2 -->
  <rect x="270" y="172" width="260" height="60" rx="10" fill="#161B22" stroke="#8B0000" stroke-width="2"/>
  <text x="400" y="198" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="#E74C3C">STEP 2</text>
  <text x="400" y="218" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#E6EDF3">Build Max Heap using buildMaxHeap()</text>

  <!-- Arrow 2→3 -->
  <line x1="400" y1="232" x2="400" y2="260" stroke="#30363D" stroke-width="2"/>
  <polygon points="400,264 394,254 406,254" fill="#30363D"/>

  <!-- Step 3 -->
  <rect x="270" y="264" width="260" height="60" rx="10" fill="#161B22" stroke="#E67E22" stroke-width="2"/>
  <text x="400" y="290" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="#E67E22">STEP 3</text>
  <text x="400" y="310" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#E6EDF3">Simulate patient treatment every few minutes</text>

  <!-- Arrow 3→4 -->
  <line x1="400" y1="324" x2="400" y2="352" stroke="#30363D" stroke-width="2"/>
  <polygon points="400,356 394,346 406,346" fill="#30363D"/>

  <!-- Step 4 -->
  <rect x="270" y="356" width="260" height="60" rx="10" fill="#161B22" stroke="#2ECC71" stroke-width="2"/>
  <text x="400" y="382" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="#2ECC71">STEP 4</text>
  <text x="400" y="402" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#E6EDF3">Insert new arriving patients</text>

  <!-- Arrow 4→5 -->
  <line x1="400" y1="416" x2="400" y2="444" stroke="#30363D" stroke-width="2"/>
  <polygon points="400,448 394,438 406,438" fill="#30363D"/>

  <!-- Step 5 -->
  <rect x="270" y="448" width="260" height="60" rx="10" fill="#161B22" stroke="#F39C12" stroke-width="2"/>
  <text x="400" y="474" text-anchor="middle" font-family="Segoe UI,Arial" font-size="13" font-weight="bold" fill="#F39C12">STEP 5</text>
  <text x="400" y="494" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" fill="#E6EDF3">Occasionally increase patient priority</text>

  <!-- Loop arrow back from step 5 to step 3 -->
  <path d="M 270 478 Q 160 478 160 324 Q 160 170 270 294" fill="none" stroke="#8B949E" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="270,294 260,288 260,300" fill="#8B949E"/>
  <text x="100" y="390" text-anchor="middle" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">24-hour</text>
  <text x="100" y="404" text-anchor="middle" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">loop</text>

  <!-- Example output box -->
  <rect x="60" y="540" width="680" height="60" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
  <text x="400" y="562" text-anchor="middle" font-family="Segoe UI,Arial" font-size="11" font-weight="bold" fill="#F39C12">Example Output</text>
  <text x="400" y="582" text-anchor="middle" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">New PatientID 152 arrived | Priority 6 | Arrival 09:12:14</text>
  <text x="400" y="596" text-anchor="middle" font-family="Segoe UI,Arial" font-size="10" fill="#8B949E">Treating Patient 899 | Priority 10 | Arrival 00:03:42</text>
</svg>
