  <circle cx="405" cy="170" r="4" fill="#1F6FEB"/>
  <circle cx="435" cy="190" r="4" fill="#1F6FEB"/>
  <circle cx="465" cy="170" r="4" fill="#1F6FEB"/>
  <circle cx="495" cy="150" r="4" fill="#1F6FEB"/>
