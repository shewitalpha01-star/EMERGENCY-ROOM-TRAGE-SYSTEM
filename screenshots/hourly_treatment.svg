  <circle cx="615" cy="140" r="4" fill="#1F6FEB"/>
  <circle cx="645" cy="140" r="4" fill="#1F6FEB"/>
  <circle cx="675" cy="150" r="4" fill="#1F6FEB"/>
  <circle cx="705" cy="170" r="4" fill="#1F6FEB"/>
  <circle cx="735" cy="150" r="4" fill="#1F6FEB"/>
