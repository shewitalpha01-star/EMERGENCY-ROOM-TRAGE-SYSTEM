  <text x="785" y="163" font-family="Segoe UI,Arial" font-size="9" fill="#FF6B6B">Avg 16</text>

  <!-- data: [15,15,16,17,17,17,16,16,18,17,20,15,13,15,17,16,14,12,18,18,17,15,17,16] -->
  <!-- x spacing: (780-60)/24 = 30px per hour, first point x=75 -->
  <!-- y = 320 - (val/25)*250 -->
  <!-- points: -->
  <!-- h1=15→y=170, h2=15→170, h3=16→160, h4=17→150, h5=17→150, h6=17→150 -->
  <!-- h7=16→160, h8=16→160, h9=18→140, h10=17→150, h11=20→120, h12=15→170 -->
  <!-- h13=13→190, h14=15→170, h15=17→150, h16=16→160, h17=14→180, h18=12→200 -->
  <!-- h19=18→140, h20=18→140, h21=17→150, h22=15→170, h23=17→150, h24=16→160 -->

