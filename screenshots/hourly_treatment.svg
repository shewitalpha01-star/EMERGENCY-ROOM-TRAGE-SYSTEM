  <line x1="60" y1="170" x2="780" y2="170" stroke="#21262D" stroke-width="1"/>
  <line x1="60" y1="220" x2="780" y2="220" stroke="#21262D" stroke-width="1"/>
  <line x1="60" y1="270" x2="780" y2="270" stroke="#21262D" stroke-width="1"/>
